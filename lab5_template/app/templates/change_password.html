{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-header bg-warning text-dark text-center">
        <h4 class="mb-0">
          <i class="bi bi-key"></i> Смена пароля
        </h4>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label for="old_password" class="form-label">Старый пароль *</label>
            <input type="password" class="form-control" id="old_password" name="old_password" required>
          </div>
          
          <div class="mb-3">
            <label for="new_password" class="form-label">Новый пароль *</label>
            <input type="password" class="form-control" id="new_password" name="new_password" required>
            <div class="form-text">
              Не менее 8 символов, заглавные и строчные буквы, цифры, без пробелов
            </div>
          </div>
          
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Повторите новый пароль *</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
          </div>
          
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-warning">
              <i class="bi bi-check-circle"></i> Изменить пароль
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">
              <i class="bi bi-x-circle"></i> Отмена
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
