<!doctype html>
<html lang="ru" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>{% if title %}{{ title }}{% else %}Лабораторная работа №2{% endif %}</title>
  </head>
  <body class="d-flex flex-column h-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
            <div class="container">
              <a class="navbar-brand text-muted" href="{{ url_for('index') }}">Лабораторная работа №2</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link text-muted" href="{{ url_for('request_params') }}">Параметры URL</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link text-muted" href="{{ url_for('request_headers') }}">Заголовки запроса</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link text-muted" href="{{ url_for('cookies') }}">Cookie</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link text-muted" href="{{ url_for('form_params') }}">Параметры формы</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link text-muted" href="{{ url_for('phone_validation') }}">Валидация телефона</a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
    </header>

    <main class="flex-shrink-0 my-3">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer mt-auto py-3 bg-light border-top">
        <div class="container text-center">
            <span class="text-muted">Выполнила: Отхонова Амуланга Александровна, группа 241-371</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
