{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-header bg-primary text-white text-center">
        <h4 class="mb-0">
          <i class="bi bi-box-arrow-in-right"></i> Вход в систему
        </h4>
      </div>
      <div class="card-body">
        <!-- Форма отправляется методом POST на ту же страницу -->
        <form method="POST" action="{{ url_for('login') }}">
          <!-- Поле для логина -->
          <div class="mb-3">
            <label for="username" class="form-label">Логин:</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username" 
                     placeholder="Введите логин" required autofocus>
            </div>
          </div>
          
          <!-- Поле для пароля -->
          <div class="mb-3">
            <label for="password" class="form-label">Пароль:</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-key"></i></span>
              <input type="password" class="form-control" id="password" name="password" 
                     placeholder="Введите пароль" required>
            </div>
          </div>
          
          <!-- Чекбокс "Запомнить меня" -->
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">
              <i class="bi bi-bookmark-check"></i> Запомнить меня
            </label>
            <div class="form-text text-muted small">(сессия сохранится после закрытия браузера)</div>
          </div>
          
          <!-- Кнопка отправки -->
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-unlock"></i> Войти
            </button>
          </div>
        </form>
        
        <hr class="my-4">
        
        <!-- Подсказка с тестовыми данными -->
        <div class="alert alert-info text-center small mb-0">
          <strong><i class="bi bi-info-circle"></i> Тестовые данные:</strong><br>
          Логин: <code>user</code><br>
          Пароль: <code>qwerty</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
