{% extends 'base.html' %}

{% block content %}
    <h1 class="my-5 text-center">Последние посты</h1>
    <div class="row mb-3">
        {% for post in posts %}
            <div class="col-md-6 d-flex align-items-stretch">
                <div class="card mb-4 shadow-sm w-100">
                    <img class="card-img-top" src="{{ url_for('static', filename='images/' + post.image_id) }}" alt="{{ post.title }}">
                    <div class="card-body d-flex flex-column">
                        <h2 class="card-title h4">{{ post.title }}</h2>
                        <p class="card-text text-muted">
                            {{ post.text | truncate(150) }}
                        </p>
                        <a href="{{ url_for('post', index=loop.index0) }}" class="btn btn-primary mt-auto">Читать дальше &rarr;</a>
                    </div>
                    <div class="card-footer text-muted small">
                        Опубликовано {{ post.date.strftime('%d.%m.%Y') }}.<br>
                        Автор: {{ post.author }}
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
