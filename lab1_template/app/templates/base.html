<!doctype html>
<html lang="ru" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>{% if title %}{{ title }}{% else %}Лабораторная работа №1{% endif %}</title>
  </head>
  <body class="d-flex flex-column h-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
            <div class="container">
              <a class="navbar-brand text-muted" href="{{ url_for('index') }}">Лабораторная работа № 1</a>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                  <li class="nav-item"><a class="nav-link text-muted" href="{{ url_for('index') }}">Задание</a></li>
                  <li class="nav-item"><a class="nav-link text-muted" href="{{ url_for('posts') }}">Посты</a></li>
                  <li class="nav-item"><a class="nav-link text-muted" href="{{ url_for('about') }}">Об авторе</a></li>
                </ul>
              </div>
            </div>
          </nav>
    </header>

    <main class="flex-shrink-0 my-3">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer mt-auto py-3 bg-light border-top">
        <div class="container text-center">
            <span class="text-muted">Выполнила: Отхонова Амуланга Александровна, группа 241-371</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
